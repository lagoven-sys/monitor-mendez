Puedes hacer un HTML o algo parecido de acceso directo con este enlace: “ <!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Situation Monitor — Jose Mendez</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #020d08;
font-family: ‘Courier New’, Courier, monospace;
display: flex;
flex-direction: column;
height: 100vh;
overflow: hidden;
}

/* ── AUTHOR BANNER ── */
.author-banner {
width: 100%;
background: #020d08;
border-bottom: 1px solid #00ff8840;
padding: 5px 0 5px;
text-align: center;
font-size: 11px;
letter-spacing: 0.22em;
color: #00cc66;
flex-shrink: 0;
position: relative;
z-index: 9999;
}

.ab-inner {
display: inline-flex;
align-items: center;
gap: 12px;
}

.ab-line {
display: inline-block;
width: 40px;
height: 1px;
background: linear-gradient(90deg, transparent, #00ff8855);
}
.ab-line.right {
background: linear-gradient(90deg, #00ff8855, transparent);
}

.ab-label {
text-transform: uppercase;
color: #006633;
font-size: 9px;
letter-spacing: 0.35em;
}

.ab-name {
color: #00ff88;
font-weight: bold;
text-transform: uppercase;
font-size: 11px;
letter-spacing: 0.28em;
text-shadow: 0 0 8px #00ff8855;
}

.ab-dot {
color: #00ff8844;
font-size: 8px;
}

/* Blinking cursor effect */
.ab-cursor {
display: inline-block;
width: 7px;
height: 11px;
background: #00ff88;
opacity: 0.7;
animation: blink 1.1s step-end infinite;
vertical-align: middle;
margin-left: 2px;
}
@keyframes blink {
0%, 100% { opacity: 0.7; }
50% { opacity: 0; }
}

/* ── IFRAME ── */
iframe {
flex: 1;
width: 100%;
border: none;
display: block;
}
</style>

</head>
<body>

<div class="author-banner">
  <span class="ab-inner">
    <span class="ab-line"></span>
    <span class="ab-dot">◆</span>
    <span class="ab-label">Realizado por</span>
    <span class="ab-name">Jose Mendez</span>
    <span class="ab-cursor"></span>
    <span class="ab-dot">◆</span>
    <span class="ab-line right"></span>
  </span>
</div>

<iframe
  src="https://the-situation-monitor.vercel.app/"
  title="Situation Monitor"
  allow="geolocation; clipboard-read; clipboard-write"
  loading="eager"
></iframe>

</body>
</html> “
